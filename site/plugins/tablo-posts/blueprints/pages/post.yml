title: Post
icon: lucide-pencil-line

num: '{{ page.date.toDate("Ymd") }}'

status:
  draft: true
  listed: true

create:
  fields:
    - date

tabs:
  content:
    columns:
      - width: 2/3
        sections:
          content:
            type: fields
            fields:
              text:
                label: Text
                type: textarea
                size: large

      - width: 1/3
        sections:
          sidebar:
            type: fields
            fields:
              date:
                label: Published
                type: date
                default: now
                required: true

              tags:
                label: Tags
                type: tags
                options:
                  type: query
                  query: page.parent().childrenAndDrafts().pluck("tags", ",", true)

              # author:
              #   label: Author
              #   type: users
              #   multiple: false

          files: sections/files

  seo: tabs/seo
