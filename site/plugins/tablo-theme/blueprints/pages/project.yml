title: Project
icon: lucide-image

tabs:
  gallery:
    label: Gallery
    columns:
      - width: 2/3
        fields:
          media:
            label: Media
            type: files
            layout: cards
            info: "{{ file.dimensions }}"
            size: medium
            image:
              ratio: 5/4
              cover: true
              back: white

      - width: 1/3
        fields:
          cover:
            label: Cover Image
            type: files
            multiple: false
            layout: cards
            size: full
            info: "{{ file.dimensions }}"
            image:
              ratio: 5/4
              cover: true
              back: white

  content:
    label: Content
    fields:
      blocks:
        label: Content
        extends: fields/blocks

      description:
        label: Description
        type: text
        help: Will be displayed as a secondary caption under the main title in projects listings.

  seo: tabs/seo
  files: tabs/files
